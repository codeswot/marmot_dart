name: marmot_dart_example
description: "Minimal demo for the marmot_dart package."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.12.0
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  marmot_dart:
    path: ../
  crypto: ^3.0.3
  file_picker: ^8.0.0
  http: ^0.13.6
  nostr_core_dart: ^1.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
